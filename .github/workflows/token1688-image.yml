name: Token1688 Image

on:
  push:
    branches:
      - main
    tags:
      - "token1688-v*"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason"
        required: false

permissions:
  contents: read

concurrency:
  group: token1688-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare build metadata
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      web_image: ${{ steps.meta.outputs.web_image }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Compute metadata
        id: meta
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          short_sha="$(git rev-parse --short=12 HEAD)"
          build_date="$(date -u +'%Y%m%d')"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="candidate-${build_date}.${GITHUB_RUN_NUMBER}-${short_sha}"
          fi

          echo "image=ghcr.io/${repo}" >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/${repo}-web" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          {
            echo "### Token1688 build metadata"
            echo
            echo "- API image: \`ghcr.io/${repo}\`"
            echo "- Web image: \`ghcr.io/${repo}-web\`"
            echo "- Version: \`${version}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Run: \`${GITHUB_RUN_ID}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  web-dist:
    name: Build web dist artifact
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Set build version
        run: echo "${{ needs.prepare.outputs.version }}" > VERSION

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.11"

      - name: Build frontend dist
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd web
          bun install --frozen-lockfile
          DISABLE_ESLINT_PLUGIN=true VITE_REACT_APP_VERSION="$(cat ../VERSION)" bun run build
          test -s dist/index.html

      - name: Package frontend dist
        run: |
          tar -C web -czf "web-dist-${{ needs.prepare.outputs.version }}.tar.gz" dist
          (cd web && find dist -type f -print0 | sort -z | xargs -0 sha256sum) > "web-dist-${{ needs.prepare.outputs.version }}.sha256"

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ needs.prepare.outputs.version }}
          path: |
            web-dist-${{ needs.prepare.outputs.version }}.tar.gz
            web-dist-${{ needs.prepare.outputs.version }}.sha256
          if-no-files-found: error

  image:
    name: Build and push images
    needs:
      - prepare
      - web-dist
    runs-on: ubuntu-latest
    outputs:
      api_digest: ${{ steps.image_meta.outputs.api_digest }}
      web_digest: ${{ steps.image_meta.outputs.web_digest }}
      api_deploy_ref: ${{ steps.image_meta.outputs.api_deploy_ref }}
      web_deploy_ref: ${{ steps.image_meta.outputs.web_deploy_ref }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Set build version
        run: echo "${{ needs.prepare.outputs.version }}" > VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f5 # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ needs.prepare.outputs.version }}
          path: web-dist-artifact

      - name: Restore frontend dist
        run: |
          rm -rf web/dist
          tar -xzf "web-dist-artifact/web-dist-${{ needs.prepare.outputs.version }}.tar.gz" -C web
          (cd web && sha256sum -c "../web-dist-artifact/web-dist-${{ needs.prepare.outputs.version }}.sha256")
          test -s web/dist/index.html

      - name: Build and push API image
        id: build_api
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.api
          platforms: linux/amd64
          push: true
          tags: |
            ${{ needs.prepare.outputs.image }}:sha-${{ needs.prepare.outputs.short_sha }}
            ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
          cache-from: type=gha,scope=token1688-api
          cache-to: type=gha,scope=token1688-api,mode=max
          provenance: true
          sbom: true

      - name: Build and push web image
        id: build_web
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.web
          platforms: linux/amd64
          push: true
          tags: |
            ${{ needs.prepare.outputs.web_image }}:sha-${{ needs.prepare.outputs.short_sha }}
            ${{ needs.prepare.outputs.web_image }}:${{ needs.prepare.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
          cache-from: type=gha,scope=token1688-web
          cache-to: type=gha,scope=token1688-web,mode=max
          provenance: true
          sbom: true

      - name: Write image metadata
        id: image_meta
        run: |
          cat > image-metadata.txt <<EOF
          image=${{ needs.prepare.outputs.image }}
          api_image=${{ needs.prepare.outputs.image }}
          web_image=${{ needs.prepare.outputs.web_image }}
          version=${{ needs.prepare.outputs.version }}
          short_sha=${{ needs.prepare.outputs.short_sha }}
          commit=${{ github.sha }}
          workflow_run=${{ github.run_id }}
          release_unit=api_web_pair
          deploy_ref_scope=api_legacy
          tag_sha=${{ needs.prepare.outputs.image }}:sha-${{ needs.prepare.outputs.short_sha }}
          tag_version=${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}
          api_tag_sha=${{ needs.prepare.outputs.image }}:sha-${{ needs.prepare.outputs.short_sha }}
          api_tag_version=${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}
          digest=${{ steps.build_api.outputs.digest }}
          api_digest=${{ steps.build_api.outputs.digest }}
          deploy_ref=${{ needs.prepare.outputs.image }}@${{ steps.build_api.outputs.digest }}
          api_deploy_ref=${{ needs.prepare.outputs.image }}@${{ steps.build_api.outputs.digest }}
          web_tag_sha=${{ needs.prepare.outputs.web_image }}:sha-${{ needs.prepare.outputs.short_sha }}
          web_tag_version=${{ needs.prepare.outputs.web_image }}:${{ needs.prepare.outputs.version }}
          web_digest=${{ steps.build_web.outputs.digest }}
          web_deploy_ref=${{ needs.prepare.outputs.web_image }}@${{ steps.build_web.outputs.digest }}
          EOF

          echo "api_digest=${{ steps.build_api.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "web_digest=${{ steps.build_web.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "api_deploy_ref=${{ needs.prepare.outputs.image }}@${{ steps.build_api.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "web_deploy_ref=${{ needs.prepare.outputs.web_image }}@${{ steps.build_web.outputs.digest }}" >> "$GITHUB_OUTPUT"

          {
            echo "### Token1688 images"
            echo
            echo "- API image: \`${{ needs.prepare.outputs.image }}\`"
            echo "- Version tag: \`${{ needs.prepare.outputs.version }}\`"
            echo "- SHA tag: \`sha-${{ needs.prepare.outputs.short_sha }}\`"
            echo "- API digest: \`${{ steps.build_api.outputs.digest }}\`"
            echo "- API deploy ref: \`${{ needs.prepare.outputs.image }}@${{ steps.build_api.outputs.digest }}\`"
            echo "- Web image: \`${{ needs.prepare.outputs.web_image }}\`"
            echo "- Web digest: \`${{ steps.build_web.outputs.digest }}\`"
            echo "- Web deploy ref: \`${{ needs.prepare.outputs.web_image }}@${{ steps.build_web.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload image metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-metadata-${{ needs.prepare.outputs.version }}
          path: image-metadata.txt
          if-no-files-found: error
